packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@nestjs/core': set this to true or false
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: set this to true or false
  prisma: true

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "prisma"
